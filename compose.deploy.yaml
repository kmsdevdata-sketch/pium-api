services:
  mysql:
    image: mysql:8.4
    container_name: pium-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
# 8081 | 8082 로만 열리게 설정 app은 로컬 포트 두개를 번갈아 사용
  app-blue:
    image: ${APP_IMAGE}
    container_name: pium-app-blue
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TZ:-Asia/Seoul}&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-3600}
      TOSS_BASE_URL: ${TOSS_BASE_URL:-https://apps-in-toss-api.toss.im}
      TOSS_DECRYPT_KEY: ${TOSS_DECRYPT_KEY}
      TOSS_AAD: ${TOSS_AAD:-TOSS}
      TOSS_MTLS_CERT_PATH: ${TOSS_MTLS_CERT_PATH}
      TOSS_MTLS_KEY_PATH: ${TOSS_MTLS_KEY_PATH}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "127.0.0.1:${APP_BLUE_PORT:-8081}:8080"
    volumes:
      - ./.secrets/toss-mtls:/app/.secrets/toss-mtls:ro

  app-green:
    image: ${APP_IMAGE}
    container_name: pium-app-green
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TZ:-Asia/Seoul}&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-3600}
      TOSS_BASE_URL: ${TOSS_BASE_URL:-https://apps-in-toss-api.toss.im}
      TOSS_DECRYPT_KEY: ${TOSS_DECRYPT_KEY}
      TOSS_AAD: ${TOSS_AAD:-TOSS}
      TOSS_MTLS_CERT_PATH: ${TOSS_MTLS_CERT_PATH}
      TOSS_MTLS_KEY_PATH: ${TOSS_MTLS_KEY_PATH}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
    ports:
      - "127.0.0.1:${APP_GREEN_PORT:-8082}:8080"
    volumes:
      - ./.secrets/toss-mtls:/app/.secrets/toss-mtls:ro

volumes:
  mysql_data:
