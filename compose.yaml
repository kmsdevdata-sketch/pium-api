services:
  mysql:
    image: mysql:8.4
    container_name: pium-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pium-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TZ:-Asia/Seoul}&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-3600}
      TOSS_BASE_URL: ${TOSS_BASE_URL:-https://apps-in-toss-api.toss.im}
      TOSS_DECRYPT_KEY: ${TOSS_DECRYPT_KEY}
      TOSS_AAD: ${TOSS_AAD:-TOSS}
      TOSS_MTLS_CERT_PATH: ${TOSS_MTLS_CERT_PATH}
      TOSS_MTLS_KEY_PATH: ${TOSS_MTLS_KEY_PATH}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${APP_PUBLISH_PORT:-8080}:8080"
    volumes:
      - ./.secrets/toss-mtls:/app/.secrets/toss-mtls:ro

volumes:
  mysql_data:
