spring:
  datasource:
    url: jdbc:h2:mem:pium;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

auth:
  toss:
    base-url: https://apps-in-toss-api.toss.im
    decrypt-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    aad: TOSS
    mtls-cert-path:
    mtls-key-path:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost:5173/admin/oauth/google/callback
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
  jwt:
    secret: test-jwt-secret-key-must-be-long-enough-123
    access-token-expiration-seconds: 3600

openai:
  product-profile:
    api-key: test-openai-api-key
    responses-uri: https://api.openai.test/v1/responses
    model: gpt-5.5
