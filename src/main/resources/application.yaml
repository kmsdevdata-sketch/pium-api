spring:
  application:
    name: pium

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pium?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:pium_user}
    password: ${DB_PASSWORD:pium_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}

auth:
  toss:
    base-url: ${TOSS_BASE_URL:https://apps-in-toss-api.toss.im}
    decrypt-key: ${TOSS_DECRYPT_KEY}
    aad: ${TOSS_AAD:TOSS}
    mtls-cert-path: ${TOSS_MTLS_CERT_PATH:.secrets/toss-mtls/pium_public.crt}
    mtls-key-path: ${TOSS_MTLS_KEY_PATH:.secrets/toss-mtls/pium_private.key}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/admin/oauth/google/callback}
    web-redirect-uri: ${GOOGLE_WEB_REDIRECT_URI:http://localhost:5173/oauth/google/callback}
    token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
    user-info-uri: ${GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/kakao/callback}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}

openai:
  product-profile:
    api-key: ${OPENAI_API_KEY:}
    responses-uri: ${OPENAI_RESPONSES_URI:https://api.openai.com/v1/responses}
    model: ${OPENAI_PRODUCT_PROFILE_MODEL:gpt-5.5}
  skin-image-analysis:
    api-key: ${OPENAI_API_KEY:}
    responses-uri: ${OPENAI_RESPONSES_URI:https://api.openai.com/v1/responses}
    model: ${OPENAI_SKIN_IMAGE_ANALYSIS_MODEL:gpt-5-nano}
